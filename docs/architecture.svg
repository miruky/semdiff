<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" role="img" aria-label="semdiffのアーキテクチャ図" color="#768390">
  <title>semdiffのアーキテクチャ</title>
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .accent-box { fill: none; stroke: #5a9bd4; stroke-width: 1.5; }
    .label { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: currentColor; }
    .small { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: currentColor; }
    .accent-label { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #5a9bd4; }
    .arrow { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#head); }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" fill="currentColor"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="160" height="70" rx="8" class="box"/>
  <text x="40" y="48" class="label">変更前JSON</text>
  <text x="40" y="72" class="small">JSON.parse</text>

  <rect x="20" y="110" width="160" height="70" rx="8" class="box"/>
  <text x="40" y="138" class="label">変更後JSON</text>
  <text x="40" y="162" class="small">JSON.parse</text>

  <rect x="250" y="50" width="240" height="100" rx="8" class="accent-box"/>
  <text x="270" y="78" class="accent-label">lib/diff</text>
  <text x="270" y="102" class="small">オブジェクト: キー集合の突き合わせ</text>
  <text x="270" y="120" class="small">配列: LCSで要素を対応付け</text>
  <text x="270" y="138" class="small">深い等価判定でキー順序を無視</text>

  <rect x="550" y="50" width="130" height="100" rx="8" class="box"/>
  <text x="570" y="78" class="label">DiffNode木</text>
  <text x="570" y="102" class="small">追加・削除・変更</text>
  <text x="570" y="120" class="small">パスとラベル</text>

  <rect x="730" y="50" width="110" height="100" rx="8" class="box"/>
  <text x="750" y="78" class="label">表示</text>
  <text x="750" y="102" class="small">折りたたみ木</text>
  <text x="750" y="120" class="small">件数バッジ</text>

  <path class="arrow" d="M180 55 H215 V85 H242"/>
  <path class="arrow" d="M180 145 H215 V115 H242"/>
  <path class="arrow" d="M490 100 H542"/>
  <path class="arrow" d="M680 100 H722"/>
</svg>
