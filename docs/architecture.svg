<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" role="img" aria-label="semdiffのアーキテクチャ図">
  <title>semdiffのアーキテクチャ</title>
  <style>
    .box { fill: none; stroke: #cabfa9; stroke-width: 1.4; }
    .accent-box { fill: none; stroke: #2d4a6b; stroke-width: 1.6; }
    .title { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #2b2a27; }
    .accent-title { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #2d4a6b; }
    .small { font: 400 11px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6f6a60; }
    .flow { stroke: #b3a892; stroke-width: 1.4; fill: none; marker-end: url(#head); }
    @media (prefers-color-scheme: dark) {
      .box { stroke: #46433b; }
      .accent-box { stroke: #7fa8d4; }
      .title { fill: #e9e4d8; }
      .accent-title { fill: #7fa8d4; }
      .small { fill: #9b9484; }
      .flow { stroke: #5a564c; }
      #head path { fill: #5a564c; }
    }
  </style>
  <defs>
    <marker id="head" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9z" fill="#b3a892" />
    </marker>
  </defs>

  <rect class="box" x="20" y="28" width="150" height="76" rx="6" />
  <text class="title" x="36" y="58">変更前 入力</text>
  <text class="small" x="36" y="80">JSON / YAML</text>

  <rect class="box" x="20" y="146" width="150" height="76" rx="6" />
  <text class="title" x="36" y="176">変更後 入力</text>
  <text class="small" x="36" y="198">JSON / YAML</text>

  <rect class="box" x="212" y="60" width="158" height="130" rx="6" />
  <text class="title" x="230" y="92">lib/parse</text>
  <text class="small" x="230" y="116">JSONはコメントと</text>
  <text class="small" x="230" y="132">末尾カンマを許容</text>
  <text class="small" x="230" y="152">YAMLはJSON互換で</text>
  <text class="small" x="230" y="168">値に変換</text>

  <rect class="accent-box" x="412" y="60" width="186" height="130" rx="6" />
  <text class="accent-title" x="430" y="92">lib/diff</text>
  <text class="small" x="430" y="116">キー集合を突き合わせ</text>
  <text class="small" x="430" y="136">配列はLCSで対応付け</text>
  <text class="small" x="430" y="156">深い等価でキー順を無視</text>

  <rect class="box" x="640" y="60" width="118" height="130" rx="6" />
  <text class="title" x="658" y="92">DiffNode木</text>
  <text class="small" x="658" y="116">追加・削除・変更</text>
  <text class="small" x="658" y="136">パスとラベル</text>

  <rect class="box" x="800" y="28" width="84" height="76" rx="6" />
  <text class="title" x="816" y="56">表示</text>
  <text class="small" x="816" y="78">折りたたみ木</text>

  <rect class="box" x="800" y="146" width="84" height="76" rx="6" />
  <text class="title" x="816" y="174">書き出し</text>
  <text class="small" x="816" y="196">Patch / MD</text>

  <path class="flow" d="M170 66 H192 V120 H208" />
  <path class="flow" d="M170 184 H192 V126 H208" />
  <path class="flow" d="M370 125 H408" />
  <path class="flow" d="M598 125 H636" />
  <path class="flow" d="M758 110 H780 V66 H796" />
  <path class="flow" d="M758 140 H780 V184 H796" />
</svg>
