<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="JSONとYAMLを行ではなく値の構造として比較する意味的diffビューア。キーの並び替えや整形の違いは差分にしない。"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f4f1ea" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1b18" media="(prefers-color-scheme: dark)" />
    <meta property="og:title" content="semdiff — 意味的diffビューア" />
    <meta
      property="og:description"
      content="JSON・YAMLを構造単位で比較する。キー順序と整形の違いに惑わされない。"
    />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>semdiff — 意味的diffビューア</title>
    <script>
      // 描画前にテーマを確定させ、初回のちらつきを防ぐ
      (function () {
        try {
          var saved = localStorage.getItem('semdiff-theme');
          if (saved === 'light' || saved === 'dark') {
            document.documentElement.dataset.theme = saved;
          }
        } catch (e) {
          /* localStorageが使えない環境では既定(OS設定)に従う */
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <noscript>semdiffはブラウザ内で差分を計算するためJavaScriptが必要です。</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
